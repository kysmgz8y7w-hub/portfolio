<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仪表盘界面 - 智能座舱</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0A0A0C;
      --border: rgba(255,255,255,0.06);
      --accent: #4a90ff;
      --accent-glow: rgba(74,144,255,0.15);
      --green: #34c759;
      --purple: #a855f7;
      --orange: #ff9f0a;
      --text: #eaeaf2;
      --text-sec: #9898b0;
      --text-dim: #555570;
      --font: -apple-system, 'PingFang SC', 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .page-header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 16px;
      padding: 0 48px; height: 64px;
      background: rgba(10,10,12,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .btn-back {
      display: flex; align-items: center; gap: 6px;
      color: var(--text-sec); text-decoration: none;
      font-size: 14px; font-weight: 500;
      padding: 6px 14px; border-radius: 8px;
      transition: all 0.15s;
    }
    .btn-back:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .btn-back svg { width: 18px; height: 18px; fill: currentColor; }

    .page-title { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }

    .detail-hero {
      padding: 80px 48px 50px;
      max-width: 1200px; margin: 0 auto;
      text-align: center;
    }
    .detail-hero h1 {
      font-size: 42px; font-weight: 800; margin-bottom: 16px;
      background: linear-gradient(135deg, var(--text) 0%, var(--text-sec) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .detail-hero p {
      font-size: 16px; color: var(--text-sec); max-width: 600px; margin: 0 auto;
      line-height: 1.8;
    }
    .detail-tags {
      display: flex; gap: 8px; justify-content: center; margin-top: 24px;
    }
    .detail-tag {
      padding: 6px 16px; border-radius: 20px;
      font-size: 12px; font-weight: 500;
    }
    .detail-tag.blue { background: rgba(74,144,255,0.08); color: var(--accent); }
    .detail-tag.purple { background: rgba(168,85,247,0.08); color: var(--purple); }
    .detail-tag.orange { background: rgba(255,159,10,0.08); color: var(--orange); }
    .detail-tag.green { background: rgba(52,199,89,0.08); color: var(--green); }

    /* Gallery */
    .gallery {
      max-width: 1200px; margin: 0 auto;
      padding: 0 48px 100px;
      display: flex; flex-direction: column; gap: 48px;
    }

    .gallery-item {
      opacity: 0; transform: translateY(20px);
      transition: all 0.6s cubic-bezier(0.22,1,0.36,1);
    }
    .gallery-item.visible { opacity: 1; transform: translateY(0); }

    .gallery-label {
      font-size: 14px; font-weight: 600; color: var(--text-sec);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .gallery-label::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }
    .gallery-label .status {
      font-size: 11px; font-weight: 500;
      padding: 3px 10px; border-radius: 10px;
      margin-left: auto;
    }
    .gallery-label .status.done {
      background: rgba(52,199,89,0.1); color: var(--green);
    }
    .gallery-label .status.wip {
      background: rgba(255,159,10,0.1); color: var(--orange);
    }

    .gallery-frame {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
    }
    .gallery-frame video,
    .gallery-frame img {
      width: 100%; display: block;
    }

    /* Placeholder */
    .gallery-placeholder {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      border: 1px dashed rgba(255,255,255,0.08);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
    }
    .gallery-placeholder svg {
      width: 40px; height: 40px; opacity: 0.12;
    }
    .gallery-placeholder span {
      font-size: 12px; color: var(--text-dim); letter-spacing: 2px;
    }

    @media (max-width: 768px) {
      .page-header { padding: 0 20px; }
      .detail-hero { padding: 60px 20px 40px; }
      .detail-hero h1 { font-size: 28px; }
      .gallery { padding: 0 20px 60px; gap: 36px; }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <a href="index.html#cockpit" class="btn-back">
      <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      返回
    </a>
    <div class="page-title">仪表盘界面</div>
  </header>

  <section class="detail-hero gallery-item">
    <h1>仪表盘界面设计</h1>
    <p>全液晶仪表盘 HMI 设计，覆盖充电、驾驶、导航、ADAS 等多场景状态展示，信息分层清晰、视觉层次分明。</p>
    <div class="detail-tags">
      <span class="detail-tag orange">仪表</span>
      <span class="detail-tag blue">ADAS</span>
      <span class="detail-tag purple">HMI</span>
      <span class="detail-tag green">多场景</span>
    </div>
  </section>

  <section class="gallery">

    <div class="gallery-item">
      <div class="gallery-label">正在充电 <span class="status done">已完成</span></div>
      <div class="gallery-frame">
        <video src="充电_hmi.mp4" autoplay loop muted playsinline></video>
      </div>
    </div>

    <div class="gallery-item">
      <div class="gallery-label">驾驶模式 <span class="status wip">设计中</span></div>
      <div class="gallery-placeholder" style="background:linear-gradient(135deg,hsl(220,25%,8%),hsl(240,20%,6%));">
        <svg viewBox="0 0 24 24" fill="currentColor" style="color:var(--accent)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.94-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        <span>COMING SOON</span>
      </div>
    </div>

    <div class="gallery-item">
      <div class="gallery-label">ADAS 激活态 <span class="status wip">设计中</span></div>
      <div class="gallery-placeholder" style="background:linear-gradient(135deg,hsl(170,25%,8%),hsl(200,20%,6%));">
        <svg viewBox="0 0 24 24" fill="currentColor" style="color:var(--green)"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
        <span>COMING SOON</span>
      </div>
    </div>

    <div class="gallery-item">
      <div class="gallery-label">导航引导 <span class="status wip">设计中</span></div>
      <div class="gallery-placeholder" style="background:linear-gradient(135deg,hsl(260,25%,8%),hsl(280,20%,6%));">
        <svg viewBox="0 0 24 24" fill="currentColor" style="color:var(--purple)"><path d="M21 3L3 10.53v.98l6.84 2.65L12.48 21h.98L21 3z"/></svg>
        <span>COMING SOON</span>
      </div>
    </div>

    <div class="gallery-item">
      <div class="gallery-label">低电量预警 <span class="status wip">设计中</span></div>
      <div class="gallery-placeholder" style="background:linear-gradient(135deg,hsl(15,25%,8%),hsl(30,20%,6%));">
        <svg viewBox="0 0 24 24" fill="currentColor" style="color:var(--orange)"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4zM13 18h-2v-2h2v2zm0-4h-2V9h2v5z"/></svg>
        <span>COMING SOON</span>
      </div>
    </div>

    <div class="gallery-item">
      <div class="gallery-label">主题切换 <span class="status wip">设计中</span></div>
      <div class="gallery-placeholder" style="background:linear-gradient(135deg,hsl(200,25%,8%),hsl(220,20%,6%));">
        <svg viewBox="0 0 24 24" fill="currentColor" style="color:var(--accent)"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-1 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
        <span>COMING SOON</span>
      </div>
    </div>

  </section>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.gallery-item').forEach(el => observer.observe(el));
  </script>
</body>
</html>
